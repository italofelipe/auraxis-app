# CI Pipeline — auraxis-app
# Stack: React Native · Expo SDK 54 · TypeScript strict · Jest · Detox (scaffold)
# Executa em todo PR e push para master.
#
# Secrets necessários (Settings → Secrets and variables → Actions):
#   EXPO_TOKEN    — Expo account token (expo.dev → Account Settings → Access Tokens)
#   SONAR_AURAXIS_APP_TOKEN — SonarCloud (sonarcloud.io → My Account → Security)
#
# Nota sobre Detox / EAS Build nativo:
#   Builds iOS/Android nativos requerem macOS runner (custo) ou self-hosted.
#   Este pipeline verifica apenas o bundle JS + testes unitários.
#   E2E com Detox deve rodar em self-hosted runner com macOS.

name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  NODE_VERSION: '25'

jobs:
  # ── 1. Lint (ESLint) ───────────────────────────────────────────────────
  lint:
    name: Lint (ESLint)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run lint -- --max-warnings 0

  # ── 2. Type-check ──────────────────────────────────────────────────────
  typecheck:
    name: TypeScript (strict)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run typecheck

  # ── 3. Hygiene de Feature Flags ────────────────────────────────────────
  feature-flag-hygiene:
    name: Feature Flags Hygiene
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Validate feature flags metadata
        run: node scripts/check-feature-flags.cjs

  # ── 4. Frontend Governance Guardrails ──────────────────────────────────
  frontend-governance:
    name: Frontend Governance
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run policy:check

  # ── 4. Testes com coverage (Jest) ──────────────────────────────────────
  test:
    name: Tests + Coverage (Jest)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci --ignore-scripts
      - name: Run tests with coverage
        run: npm run test:coverage
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  # ── 4.1 Contract Smoke (OpenAPI + Feature Contract Packs) ──────────────
  contract-smoke:
    name: Contract Smoke (OpenAPI + Packs)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci --ignore-scripts
      - name: Validate generated OpenAPI types and contract pack baseline
        run: npm run contracts:check

  # ── 5. Expo JS Bundle Check ────────────────────────────────────────────
  # Verifica que o bundle JS compila sem erros (não requer macOS).
  expo-bundle:
    name: Expo JS Bundle Check
    runs-on: ubuntu-latest
    needs: [lint, typecheck, feature-flag-hygiene, frontend-governance, test, contract-smoke]
    outputs:
      enabled: ${{ steps.capability.outputs.enabled }}
    permissions:
      contents: read
    steps:
      - name: Check Expo capability
        id: capability
        env:
          EXPO_TOKEN_VALUE: ${{ secrets.EXPO_TOKEN }}
        run: |
          if [ -n "${EXPO_TOKEN_VALUE:-}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Expo JS bundle skipped: EXPO_TOKEN not available for this run."
          fi

      - uses: actions/checkout@v4
        if: steps.capability.outputs.enabled == 'true'
      - uses: actions/setup-node@v4
        if: steps.capability.outputs.enabled == 'true'
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - if: steps.capability.outputs.enabled == 'true'
        run: npm ci --ignore-scripts
      - name: Setup Expo
        if: steps.capability.outputs.enabled == 'true'
        uses: expo/expo-github-action@v8
        with:
          token: ${{ secrets.EXPO_TOKEN }}
      - name: Export JS bundle (Android + iOS)
        if: steps.capability.outputs.enabled == 'true'
        run: npx expo export --platform all --output-dir dist
        continue-on-error: false
      - name: Upload bundle artifact
        if: steps.capability.outputs.enabled == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: expo-bundle-all
          path: dist/
          retention-days: 1

  # ── 6. Bundle Size Analysis (Metro) ────────────────────────────────────
  bundle-analysis:
    name: Bundle Size Analysis (Metro)
    runs-on: ubuntu-latest
    needs: [expo-bundle]
    if: github.event_name == 'pull_request' && needs.expo-bundle.outputs.enabled == 'true'
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - name: Download bundle artifact from previous job
        uses: actions/download-artifact@v4
        with:
          name: expo-bundle-all
          path: dist
      - name: Report bundle sizes
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            function getDirSize(dirPath) {
              if (!fs.existsSync(dirPath)) return 0;
              let total = 0;
              const entries = fs.readdirSync(dirPath, { withFileTypes: true });
              for (const entry of entries) {
                const full = path.join(dirPath, entry.name);
                if (entry.isDirectory()) total += getDirSize(full);
                else total += fs.statSync(full).size;
              }
              return total;
            }

            const fmt = (b) => b === 0 ? 'N/A' : (b / 1024).toFixed(1) + ' KB';
            const android = getDirSize('dist/_expo/static/js/android');
            const ios = getDirSize('dist/_expo/static/js/ios');

            const body = [
              '## 📦 Bundle Size Report (Metro)',
              '',
              '| Platform | Bundle Size |',
              '|:---------|------------:|',
              `| Android | ${fmt(android)} |`,
              `| iOS | ${fmt(ios)} |`,
              '',
              '> Thresholds: ≤ 3 MB (aviso) · ≤ 8 MB (hard limit por plataforma — inclui Sentry SDK ~1.5 MB)',
            ].join('\n');

            try {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            } catch (error) {
              core.warning(`Could not post bundle report comment: ${error.message}`);
            }

            // Limit raised to 8 MB: @sentry/react-native adds ~1.5 MB (observability trade-off, justified).
            // Revisit if bundle exceeds 8 MB after further growth.
            const limit = 8 * 1024 * 1024;
            if (android > limit) core.setFailed(`Android bundle too large: ${fmt(android)}`);
            if (ios > limit) core.setFailed(`iOS bundle too large: ${fmt(ios)}`);

  # ── 6. Secret Scan (Gitleaks) ──────────────────────────────────────────
  secret-scan-gitleaks:
    name: Secret Scan (Gitleaks)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── 7. Secret Scan (TruffleHog) ────────────────────────────────────────
  secret-scan-trufflehog:
    name: Secret Scan (TruffleHog)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install TruffleHog binary (retry)
        run: |
          set -euo pipefail
          version="v3.90.5"
          archive="trufflehog_${version#v}_linux_amd64.tar.gz"
          url="https://github.com/trufflesecurity/trufflehog/releases/download/${version}/${archive}"

          for attempt in 1 2 3; do
            echo "Download attempt ${attempt}..."
            if curl -fsSL --connect-timeout 20 --max-time 120 "$url" -o "/tmp/${archive}"; then
              break
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "Failed to download TruffleHog after retries." >&2
              exit 1
            fi
            sleep $((attempt * 5))
          done

          tar -xzf "/tmp/${archive}" -C /tmp
          sudo mv /tmp/trufflehog /usr/local/bin/trufflehog
          trufflehog --version

      - name: Run TruffleHog
        run: trufflehog filesystem . --only-verified --fail

  # ── 8. Dependency Audit ────────────────────────────────────────────────
  audit:
    name: Dependency Audit (npm)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci --ignore-scripts
      - name: Audit runtime deps (high/critical) with temporary Expo allowlist
        run: node scripts/ci-audit-gate.js

  # ── 9. SonarCloud ──────────────────────────────────────────────────────
  # Modelo oficial: CI-based analysis (Automatic Analysis desabilitado no SonarCloud).
  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: [test]
    permissions:
      contents: read
    steps:
      - name: Check Sonar capability
        id: capability
        env:
          SONAR_TOKEN_VALUE: ${{ secrets.SONAR_AURAXIS_APP_TOKEN }}
        run: |
          if [ -n "${SONAR_TOKEN_VALUE:-}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::SonarCloud skipped: token not available for this run."
          fi

      - uses: actions/checkout@v4
        if: steps.capability.outputs.enabled == 'true'
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        if: steps.capability.outputs.enabled == 'true'
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - if: steps.capability.outputs.enabled == 'true'
        run: npm ci --ignore-scripts
      - name: Generate coverage for Sonar
        if: steps.capability.outputs.enabled == 'true'
        run: npm run test:coverage
      - name: SonarCloud Scan
        if: steps.capability.outputs.enabled == 'true'
        uses: SonarSource/sonarqube-scan-action@fd88b7d7ccbaefd23d8f36f73b59db7a3d246602 # v6.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_AURAXIS_APP_TOKEN }}

  # ── 10. Commit lint ────────────────────────────────────────────────────
  commitlint:
    name: Conventional Commits
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose

  # ── 11. Detox E2E (scaffold — self-hosted macOS runner) ────────────────
  # Este job está comentado por padrão.
  # Para habilitar: descomentar + configurar self-hosted runner com macOS + Xcode.
