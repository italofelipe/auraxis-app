name: Store Release (Manual + Tag)

on:
  workflow_dispatch:
    inputs:
      platform:
        description: "Plataforma alvo do build"
        required: true
        default: all
        type: choice
        options:
          - android
          - ios
          - all
      profile:
        description: "Perfil do EAS Build"
        required: true
        default: production
        type: choice
        options:
          - preview
          - production
      auto_submit:
        description: "Submeter automaticamente para store"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  push:
    tags:
      - "v*"

jobs:
  build-and-submit:
    name: Build/Submit to Stores
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Validate EXPO_TOKEN
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          if [ -z "${EXPO_TOKEN:-}" ]; then
            echo "Missing required secret: EXPO_TOKEN" >&2
            exit 1
          fi

      - name: Setup Expo
        uses: expo/expo-github-action@c7b66a9c327a43a8fa7c0158e7f30d6040d2481e # v8
        with:
          eas-version: 16.13.0
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Verify EAS context
        run: |
          set -euo pipefail
          eas whoami
          eas project:info

      - name: Resolve build parameters
        id: params
        env:
          DISPATCH_PLATFORM: ${{ inputs.platform }}
          DISPATCH_PROFILE: ${{ inputs.profile }}
          DISPATCH_AUTO_SUBMIT: ${{ inputs.auto_submit }}
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "push" ]; then
            # Tag push (v*) -> full production release on both platforms with auto-submit
            platform="all"
            profile="production"
            auto_submit="true"
          else
            platform="${DISPATCH_PLATFORM:-all}"
            profile="${DISPATCH_PROFILE:-production}"
            auto_submit="${DISPATCH_AUTO_SUBMIT:-false}"
          fi
          {
            echo "platform=$platform"
            echo "profile=$profile"
            echo "auto_submit=$auto_submit"
          } >> "$GITHUB_OUTPUT"
          echo "Resolved trigger=${{ github.event_name }} platform=$platform profile=$profile auto_submit=$auto_submit"

      - name: Trigger build/submission
        env:
          PLATFORM: ${{ steps.params.outputs.platform }}
          PROFILE: ${{ steps.params.outputs.profile }}
          AUTO_SUBMIT: ${{ steps.params.outputs.auto_submit }}
        run: |
          set -euo pipefail

          extra_args=""
          if [ "$AUTO_SUBMIT" = "true" ]; then
            extra_args="--auto-submit"
          fi

          eas build \
            --platform "$PLATFORM" \
            --profile "$PROFILE" \
            --non-interactive \
            $extra_args
