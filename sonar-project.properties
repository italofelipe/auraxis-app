# SonarCloud — auraxis-app
# Documentação: https://docs.sonarcloud.io/advanced-setup/ci-based-analysis/github-actions-for-sonarcloud/

sonar.projectKey=italofelipe_auraxis-app
sonar.organization=sensoriumit

# Informações do projeto
sonar.projectName=auraxis-app
sonar.projectVersion=1.0

# Escopo baseline alinhado ao coverage real atual da arquitetura canônica
# Mantemos sonar.sources=. e restringimos a análise via inclusions para evitar
# drift quando diretórios legados forem removidos.
sonar.sources=.
sonar.inclusions=features/tools/services/tools-service.ts,features/tools/hooks/use-tools-catalog-query.ts,app/index.tsx,app/(private)/ferramentas.tsx,core/providers/app-providers.tsx,core/navigation/deep-linking.ts,core/shell/runtime-revalidation.ts,core/shell/use-app-startup.ts,core/shell/use-runtime-lifecycle.ts,features/subscription/services/hosted-checkout-service.ts,shared/feature-flags/service.ts,shared/components/app-screen.tsx,shared/components/app-surface-card.tsx,shared/components/app-button.tsx,shared/components/app-input-field.tsx,shared/components/app-key-value-row.tsx,shared/components/app-toggle-row.tsx,shared/components/async-state-notice.tsx,shared/utils/formatters.ts,shared/validators/installment-vs-cash.ts,features/alerts/components/alert-record-card.tsx,features/alerts/components/alert-preference-row.tsx,features/entitlements/components/paywall-gate.tsx,features/entitlements/hooks/use-feature-access.ts,features/fiscal/services/fiscal-service.ts,features/fiscal/hooks/use-fiscal-query.ts,features/fiscal/hooks/use-fiscal-mutations.ts,features/questionnaire/services/questionnaire-service.ts,features/questionnaire/hooks/use-questionnaire-query.ts,features/questionnaire/hooks/use-questionnaire-mutations.ts,features/shared-entries/services/shared-entries-service.ts,features/shared-entries/hooks/use-shared-entries-query.ts,features/shared-entries/hooks/use-shared-entries-mutations.ts,features/subscription/components/upgrade-cta.tsx,features/tools/services/installment-vs-cash-service.ts,features/tools/hooks/use-installment-vs-cash-history-query.ts,features/tools/components/installment-vs-cash-form.tsx,features/tools/components/installment-vs-cash-history-list.tsx,features/tools/components/installment-vs-cash-result-card.tsx,features/transactions/services/transactions-service.ts,features/transactions/hooks/use-transactions-query.ts,features/transactions/hooks/use-transaction-mutations.ts,features/user-profile/services/user-profile-service.ts,features/user-profile/hooks/use-user-profile-query.ts,features/user-profile/hooks/use-user-profile-mutations.ts,app/(private)/installment-vs-cash.tsx,components/themed-text.tsx,components/themed-view.tsx,components/ui/collapsible.tsx,hooks/use-theme-color.ts
sonar.exclusions=**/node_modules/**,**/.expo/**,**/dist/**,**/coverage/**,**/__tests__/**,**/artifacts/**,**/e2e/**,**/*.spec.ts,**/*.spec.tsx,**/*.test.ts,**/*.test.tsx

sonar.tests=.
sonar.test.inclusions=**/*.spec.ts,**/*.spec.tsx,**/*.test.ts,**/*.test.tsx,**/__tests__/**/*.{ts,tsx}

# Coverage — gerado por Jest (npm run test:coverage)
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info

# Encoding
sonar.sourceEncoding=UTF-8

# TypeScript
sonar.typescript.tsconfigPath=tsconfig.json
